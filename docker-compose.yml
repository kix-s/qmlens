services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qmlens-backend
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: qmlens-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
